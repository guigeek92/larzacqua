[theme]
base = "dark"
primaryColor = "#33c0ff"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#111827"
textColor = "#e5eef9"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "minimal"

[server]
port = 8501
headless = false
runOnSave = true
maxUploadSize = 200

[logger]
level = "info"
